  /* ============================================================
     DESIGN TOKENS — change the whole look by editing these.
     ============================================================ */
  :root{
    --bg:            #0B1120;
    --bg-panel:      #121B2E;
    --bg-panel-2:    #16213A;
    --line:          #263349;
    --line-soft:     #1B2740;
    --text:          #E7ECF3;
    --text-dim:      #8B97AF;
    --text-faint:    #5B6981;
    --accent:        #F2A93B;   /* amber — "flagged / attention" */
    --accent-soft:   rgba(242,169,59,0.12);
    --ok:            #57B36C;   /* "secure / deployed" green */
    --ok-soft:       rgba(87,179,108,0.12);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    line-height:1.6;
    overflow-x:hidden;
  }
  a{ color:inherit; text-decoration:none; }
  ::selection{ background:var(--accent); color:#0B1120; }

  /* subtle blueprint grid backdrop */
  .grid-bg{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(var(--line-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
    background-size:48px 48px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, #000 40%, transparent 100%);
    opacity:0.5;
  }

  .wrap{ max-width:1040px; margin:0 auto; padding:0 28px; position:relative; z-index:1; }

  /* ---------- top bar ---------- */
  .topbar{
    position:fixed; top:0; left:0; right:0; z-index:50;
    background:rgba(11,17,32,0.85); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .topbar-inner{
    max-width:1040px; margin:0 auto; padding:16px 28px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .brand{ font-family:var(--mono); font-weight:600; font-size:14px; letter-spacing:0.5px; }
  .brand span{ color:var(--accent); }
  .nav{ display:flex; gap:28px; font-family:var(--mono); font-size:13px; color:var(--text-dim); }
  .nav a:hover{ color:var(--accent); }
  .status-pill{
    display:flex; align-items:center; gap:7px;
    font-family:var(--mono); font-size:11px; color:var(--ok);
    border:1px solid var(--line); padding:5px 10px; border-radius:20px;
  }
  .dot{ width:6px; height:6px; border-radius:50%; background:var(--ok); box-shadow:0 0 6px var(--ok); animation:pulse 2s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.35;} }
  @media (max-width:720px){ .nav{ display:none; } }

  /* ---------- hero ---------- */
  .hero{
    min-height:100vh; display:flex; flex-direction:column; justify-content:center;
    padding-top:90px; padding-bottom:60px; position:relative;
  }
  .eyebrow{
    font-family:var(--mono); font-size:12px; color:var(--accent);
    letter-spacing:2px; text-transform:uppercase; margin-bottom:18px;
    display:flex; align-items:center; gap:10px;
  }
  .eyebrow::before{ content:'>'; color:var(--text-faint); }
  h1.name{
    font-family:var(--mono); font-weight:700;
    font-size:clamp(38px, 7vw, 74px);
    line-height:1.05; letter-spacing:-1px;
    margin-bottom:18px;
  }
  .cursor{ display:inline-block; width:0.5ch; background:var(--accent); animation:blink 1s step-end infinite; }
  @keyframes blink{ 50%{ opacity:0; } }
  .role{
    font-family:var(--sans); font-weight:600; font-size:clamp(18px,2.6vw,26px);
    color:var(--text-dim); max-width:640px; margin-bottom:22px;
  }
  .tagline{ max-width:560px; color:var(--text-dim); font-size:15.5px; margin-bottom:34px; }
  .cta-row{ display:flex; gap:14px; flex-wrap:wrap; }
  .btn{
    font-family:var(--mono); font-size:13px; font-weight:600;
    padding:13px 22px; border-radius:6px; border:1px solid var(--line);
    display:inline-flex; align-items:center; gap:8px; transition:all .18s ease;
  }
  .btn-primary{ background:var(--accent); color:#1a1200; border-color:var(--accent); }
  .btn-primary:hover{ transform:translateY(-2px); box-shadow:0 8px 22px -8px rgba(242,169,59,0.55); }
  .btn-ghost{ color:var(--text); }
  .btn-ghost:hover{ border-color:var(--accent); color:var(--accent); }

  .scan-note{
    margin-top:56px; font-family:var(--mono); font-size:11px; color:var(--text-faint);
    border-top:1px solid var(--line-soft); padding-top:16px; display:flex; gap:24px; flex-wrap:wrap;
  }
  .scan-note b{ color:var(--text-dim); font-weight:600; }

  /* ---------- section shell ---------- */
  section{ padding:90px 0; border-top:1px solid var(--line-soft); position:relative; }
  .sec-head{ display:flex; align-items:baseline; gap:14px; margin-bottom:42px; flex-wrap:wrap; }
  .sec-prompt{ font-family:var(--mono); font-size:13px; color:var(--text-faint); }
  .sec-title{ font-family:var(--mono); font-size:26px; font-weight:700; }

  /* ---------- about ---------- */

  @media (max-width:800px){ .about-grid{ grid-template-columns:1fr; } }
  .about-text p{ color:var(--text-dim); font-size:15.5px; margin-bottom:16px; max-width:56ch; }
  .about-text p b{ color:var(--text); font-weight:600; }
  .info-card{
    background:var(--bg-panel); border:1px solid var(--line); border-radius:10px; padding:22px;
    font-family:var(--mono); font-size:13px;

  .info-row:last-child{ border-bottom:none; }
  .info-row span:first-child{ color:var(--text-faint); }
  .info-row span:last-child{ color:var(--text); text-align:right; }

  /* ---------- skills ---------- */
  .skill-groups{ display:grid; grid-template-columns:repeat(2, 1fr); gap:28px 48px; }
  @media (max-width:700px){ .skill-groups{ grid-template-columns:1fr; } }
  .skill-group-title{ font-family:var(--mono); font-size:12px; color:var(--accent); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:12px; }
  .chip-row{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{
    font-family:var(--mono); font-size:12.5px; padding:6px 12px; border-radius:5px;
    border:1px solid var(--line); color:var(--text-dim); background:var(--bg-panel);
  }

  /* ---------- experience / education timeline ---------- */
  .tl-item{ display:grid; grid-template-columns:150px 1fr; gap:24px; padding:22px 0; border-bottom:1px solid var(--line-soft); }
  .tl-item:last-child{ border-bottom:none; }
  @media (max-width:640px){ .tl-item{ grid-template-columns:1fr; gap:6px; } }
  .tl-date{ font-family:var(--mono); font-size:12px; color:var(--text-faint); }
  .tl-role{ font-weight:700; font-size:16.5px; margin-bottom:4px; }
  .tl-org{ color:var(--accent); font-size:13.5px; font-family:var(--mono); margin-bottom:8px; }
  .tl-desc{ color:var(--text-dim); font-size:14.5px; max-width:60ch; }
  .tl-desc li{ margin-left:18px; margin-bottom:4px; }

  /* ---------- projects ---------- */
  .proj-grid{ display:grid; grid-template-columns:repeat(2, 1fr); gap:20px; }
  @media (max-width:760px){ .proj-grid{ grid-template-columns:1fr; } }
  .proj-card{
    background:var(--bg-panel); border:1px solid var(--line); border-radius:10px;
    padding:22px; display:flex; flex-direction:column; gap:12px; transition:border-color .2s ease, transform .2s ease;

  .proj-card:hover{ border-color:var(--accent); transform:translateY(-3px); }
  .proj-card.featured{ grid-column:1 / -1; background:var(--bg-panel-2); }
  .proj-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
  .proj-name{ font-weight:700; font-size:17px; }
  .badge{
    font-family:var(--mono); font-size:10.5px; padding:4px 9px; border-radius:20px;
    white-space:nowrap; letter-spacing:0.4px;
  }
  .badge-ok{ background:var(--ok-soft); color:var(--ok); border:1px solid rgba(87,179,108,0.3); }
  .badge-accent{ background:var(--accent-soft); color:var(--accent); border:1px solid rgba(242,169,59,0.3); }
  .proj-desc{ color:var(--text-dim); font-size:14px; flex-grow:1; }
  .proj-stack{ display:flex; flex-wrap:wrap; gap:6px; }
  .tag{ font-family:var(--mono); font-size:11px; color:var(--text-faint); border:1px solid var(--line); padding:3px 8px; border-radius:4px; }
  .proj-link{ font-family:var(--mono); font-size:12.5px; color:var(--accent); display:inline-flex; align-items:center; gap:6px; margin-top:4px; }
  .proj-link:hover{ text-decoration:underline; }
  .proj-stats{ display:flex; gap:18px; font-family:var(--mono); font-size:12px; color:var(--text-dim); margin-top:2px; }

  /* ---------- contact / footer ---------- */

    background:var(--bg-panel); border:1px solid var(--line); border-radius:12px;
    padding:44px; text-align:center;
  }
  .contact-box h3{ font-family:var(--mono); font-size:24px; margin-bottom:12px; }
  .contact-box p{ color:var(--text-dim); max-width:50ch; margin:0 auto 26px; }
  .contact-links{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
  footer{ text-align:center; padding:36px 0 60px; font-family:var(--mono); font-size:12px; color:var(--text-faint); }

  /* reveal animation */
  .reveal{ opacity:0; transform:translateY(16px); transition:opacity .6s ease, transform .6s ease; }
  .reveal.show{ opacity:1; transform:translateY(0); }

  @media (prefers-reduced-motion: reduce){
    .reveal{ opacity:1; transform:none; transition:none; }
    .dot, .cursor{ animation:none; }
  }
</style>

const $ = (id) => document.getElementById(id);

// Hero
function typeInto(el, text, speed=42){
  el.innerHTML = "";
  let i = 0;
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  cursor.textContent = '_';
  function step(){
    if(i <= text.length){
      el.textContent = text.slice(0, i);
      el.appendChild(cursor);
      i++;
      setTimeout(step, speed);
    }
  }
  step();
}

  <a class="btn btn-ghost" href="${PORTFOLIO_DATA.links.github}" target="_blank">GitHub</a>
  <a class="btn btn-ghost" href="${PORTFOLIO_DATA.links.linkedin}" target="_blank">LinkedIn</a>
`;
$('footerText').textContent = PORTFOLIO_DATA.footer;

// Scroll reveal
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('show'); });
}, { threshold: 0.12 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
